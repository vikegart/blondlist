<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1118">
<title>vikegart — гараж и вишлист</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    min-height: 100vh;
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e8ecf4;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(28px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    background:
      radial-gradient(100% 60% at 50% 0%, rgba(0, 220, 255, 0.12), transparent 55%),
      radial-gradient(80% 50% at 0% 100%, rgba(255, 0, 170, 0.08), transparent 50%),
      radial-gradient(70% 45% at 100% 80%, rgba(0, 255, 200, 0.06), transparent 45%),
      linear-gradient(180deg, #0d1118 0%, #121820 40%, #0a0c10 100%);
    overflow-x: hidden;
  }

  .page {
    width: min(560px, 100%);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: clamp(14px, 3.5vw, 20px);
  }

  header { text-align: center; }

  h1 {
    margin: 0;
    font-size: clamp(1.25rem, 4.5vw, 1.75rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(110deg, #5cffe8 0%, #ff4fd8 50%, #7ecbff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    margin: 6px 0 0;
    font-size: clamp(0.78rem, 3vw, 0.92rem);
    opacity: 0.72;
    font-weight: 500;
  }

  .back {
    margin: 0;
    font-size: 0.85rem;
    text-align: center;
  }

  .back a {
    color: rgba(120, 220, 255, 0.85);
    text-decoration: none;
    border-bottom: 1px solid rgba(120, 220, 255, 0.35);
  }

  .back a:hover { border-bottom-color: rgba(120, 220, 255, 0.85); }

  .edit-wish {
    margin: 10px 0 0;
    text-align: center;
    font-size: clamp(0.78rem, 2.9vw, 0.88rem);
  }

  .edit-wish a {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 600;
    color: #0a0c10;
    text-decoration: none;
    background: linear-gradient(120deg, #5cffe8 0%, #7ecbff 100%);
    box-shadow: 0 4px 14px rgba(0, 245, 255, 0.2);
  }

  .edit-wish a:hover { filter: brightness(1.06); }

  /* Dark glass panel (same family as index.html glass) */
  .glass {
    position: relative;
    border-radius: clamp(18px, 4vw, 26px);
    padding: clamp(14px, 3.5vw, 22px);
    background: linear-gradient(150deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid rgba(120, 200, 255, 0.22);
    box-shadow:
      0 4px 28px rgba(0, 0, 0, 0.35),
      0 0 0 1px rgba(255, 80, 200, 0.06) inset,
      0 1px 0 rgba(255,255,255,0.06) inset;
    backdrop-filter: blur(18px) saturate(1.25);
    -webkit-backdrop-filter: blur(18px) saturate(1.25);
  }

  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(125deg, rgba(0,255,230,0.35), rgba(255,80,200,0.2), rgba(120,180,255,0.25));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .hero {
    position: relative;
    border-radius: clamp(16px, 4vw, 22px);
    overflow: hidden;
    background: linear-gradient(180deg, #151922 0%, #0c0e14 100%);
    border: 1px solid rgba(80, 140, 180, 0.25);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
  }

  .hero svg {
    display: block;
    width: 100%;
    height: auto;
    vertical-align: middle;
  }

  /* Neon underglow strips (HTML overlay for smoother blink) */
  .neon-layer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 28%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 6px;
    padding-bottom: 6px;
    pointer-events: none;
  }

  .neon-bar {
    width: 18%;
    max-width: 72px;
    height: 10px;
    border-radius: 999px;
    opacity: 0.55;
    filter: blur(0.5px);
    animation: neon-blink 2.4s ease-in-out infinite;
  }

  .neon-bar:nth-child(1) {
    background: linear-gradient(90deg, #00f5ff, #00c8ff);
    box-shadow: 0 0 18px #00f5ff, 0 0 36px rgba(0, 245, 255, 0.45);
    animation-delay: 0s;
  }

  .neon-bar:nth-child(2) {
    background: linear-gradient(90deg, #ff2fd8, #ff6beb);
    box-shadow: 0 0 18px #ff2fd8, 0 0 34px rgba(255, 47, 216, 0.4);
    animation-delay: 0.35s;
  }

  .neon-bar:nth-child(3) {
    background: linear-gradient(90deg, #7cf0ff, #b388ff);
    box-shadow: 0 0 16px #9ecbff, 0 0 30px rgba(180, 200, 255, 0.4);
    animation-delay: 0.7s;
  }

  @keyframes neon-blink {
    0%, 100% { opacity: 0.35; transform: scaleX(0.92); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  .wish-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(10px, 2.5vw, 14px);
  }

  @media (min-width: 420px) {
    .wish-grid { grid-template-columns: 1fr 1fr; }
  }

  .gift {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    text-decoration: none;
    color: inherit;
    border-radius: clamp(14px, 3vw, 18px);
    padding: 12px 12px 14px;
    background: linear-gradient(145deg, rgba(30, 36, 48, 0.65), rgba(18, 22, 30, 0.75));
    border: 1px solid rgba(100, 170, 220, 0.18);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }

  a.gift:hover {
    border-color: rgba(0, 245, 255, 0.45);
    box-shadow: 0 0 0 1px rgba(255, 80, 200, 0.12), 0 8px 24px rgba(0, 0, 0, 0.35);
    transform: translateY(-1px);
  }

  a.gift:active { transform: translateY(0); }

  .gift-pix {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .gift-pix svg {
    width: 32px;
    height: 32px;
    shape-rendering: crispEdges;
    image-rendering: pixelated;
  }

  .gift-body { min-width: 0; }

  .gift-title {
    font-weight: 700;
    font-size: clamp(0.82rem, 2.8vw, 0.95rem);
    line-height: 1.25;
    margin: 0 0 4px;
    color: #f2f6ff;
  }

  .gift-note {
    margin: 0;
    font-size: clamp(0.7rem, 2.4vw, 0.8rem);
    line-height: 1.35;
    opacity: 0.78;
    color: #c8d0e0;
  }

  .gift-note strong { color: #9ef5ff; font-weight: 600; }

  .gift-dual {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
  }

  .gift-dual a {
    font-size: clamp(0.72rem, 2.4vw, 0.8rem);
    color: #7ee8ff;
    text-decoration: none;
    border-bottom: 1px solid rgba(126, 232, 255, 0.35);
    align-self: flex-start;
  }

  .gift-dual a:hover { border-bottom-color: #7ee8ff; }

  .foot {
    text-align: center;
    font-size: 0.72rem;
    opacity: 0.45;
    margin-top: 4px;
  }

  @media (prefers-reduced-motion: reduce) {
    .neon-bar { animation: none !important; opacity: 0.72; }
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <p class="back"><a href="../index.html">← Блондинка Wish Casino</a></p>
    <h1>vikegart — гараж</h1>
    <p class="sub">Пиксельный гараж, Corvette C7 и неон. Ниже — подарки со ссылками.</p>
    <p class="edit-wish"><a href="../garage-wishlist-edit.html">Редактировать вишлист</a></p>
  </header>

  <div class="hero" aria-label="Пиксельная сцена: гараж и спорткар">
    <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" role="img" aria-labelledby="garageTitle">
      <title id="garageTitle">Пиксельный гараж и красный Corvette C7</title>
      <!-- Night back wall -->
      <rect x="0" y="0" width="200" height="56" fill="#1a1f28"/>
      <rect x="0" y="56" width="200" height="44" fill="#141820"/>
      <!-- Wall panels -->
      <rect x="8" y="10" width="56" height="40" fill="#252b36"/>
      <rect x="72" y="10" width="56" height="40" fill="#222833"/>
      <rect x="136" y="10" width="56" height="40" fill="#252b36"/>
      <!-- Horizontal beams -->
      <rect x="0" y="8" width="200" height="4" fill="#303848"/>
      <rect x="0" y="46" width="200" height="4" fill="#303848"/>
      <!-- Garage door frame -->
      <rect x="62" y="18" width="76" height="38" fill="#0e1218"/>
      <rect x="64" y="20" width="72" height="34" fill="#1c2430"/>
      <!-- Door stripes -->
      <rect x="68" y="22" width="10" height="30" fill="#2a3444"/>
      <rect x="82" y="22" width="10" height="30" fill="#2a3444"/>
      <rect x="96" y="22" width="10" height="30" fill="#2a3444"/>
      <rect x="110" y="22" width="10" height="30" fill="#2a3444"/>
      <rect x="124" y="22" width="10" height="30" fill="#2a3444"/>
      <!-- Floor -->
      <rect x="0" y="70" width="200" height="30" fill="#1e222c"/>
      <rect x="0" y="88" width="200" height="2" fill="#3a4558"/>
      <!-- Parking lines -->
      <rect x="16" y="78" width="4" height="14" fill="#c8b860"/>
      <rect x="180" y="78" width="4" height="14" fill="#c8b860"/>
      <!-- Corvette C7 side (pixel blocks, red) -->
      <g transform="translate(78, 58)">
        <!-- shadow -->
        <rect x="-2" y="20" width="52" height="4" fill="#0a0c10" opacity="0.55"/>
        <!-- lower body -->
        <rect x="0" y="12" width="48" height="8" fill="#b8142a"/>
        <rect x="4" y="8" width="40" height="6" fill="#d02038"/>
        <!-- cabin / targa roof black -->
        <rect x="10" y="4" width="22" height="6" fill="#121418"/>
        <rect x="8" y="6" width="6" height="6" fill="#121418"/>
        <!-- nose -->
        <rect x="40" y="10" width="8" height="6" fill="#d02038"/>
        <rect x="44" y="8" width="4" height="4" fill="#d02038"/>
        <!-- highlight -->
        <rect x="14" y="10" width="16" height="2" fill="#ff5a72" opacity="0.5"/>
        <!-- wheels -->
        <rect x="6" y="16" width="8" height="8" fill="#0c0c10"/>
        <rect x="8" y="18" width="4" height="4" fill="#3a3a44"/>
        <rect x="34" y="16" width="8" height="8" fill="#0c0c10"/>
        <rect x="36" y="18" width="4" height="4" fill="#3a3a44"/>
        <!-- tail -->
        <rect x="0" y="12" width="4" height="6" fill="#8a0e22"/>
      </g>
      <!-- Tool shelf hint -->
      <rect x="168" y="52" width="24" height="3" fill="#3a4558"/>
      <rect x="172" y="46" width="4" height="6" fill="#4a5668"/>
      <rect x="180" y="44" width="4" height="8" fill="#4a5668"/>
    </svg>
    <div class="neon-layer" aria-hidden="true">
      <span class="neon-bar"></span>
      <span class="neon-bar"></span>
      <span class="neon-bar"></span>
    </div>
  </div>

  <div class="glass">
    <div class="wish-grid" id="wishGrid"></div>
  </div>

  <p class="foot">Открыто как <code>/vikegart/</code> · с корня редирект: <code>vikegart.html</code></p>
</div>

<script src="../wishlist-garage-shared.js"></script>
<script>
(function () {
  var NS = "http://www.w3.org/2000/svg";

  var PIX = {
    "Airless basketball": '<rect width="12" height="12" fill="#2a2420"/><circle cx="6" cy="6" r="5" fill="#c45c38"/><circle cx="6" cy="6" r="4" fill="#1a1814"/><rect x="2" y="5" width="1" height="1" fill="#555"/><rect x="5" y="3" width="1" height="1" fill="#555"/><rect x="8" y="6" width="1" height="1" fill="#555"/><rect x="4" y="8" width="1" height="1" fill="#555"/><rect x="7" y="4" width="1" height="1" fill="#555"/>',
    "Картинг KZ / KZ2": '<rect width="12" height="12" fill="#1a2228"/><rect x="1" y="6" width="10" height="4" fill="#333"/><rect x="2" y="5" width="8" height="3" fill="#e02020"/><rect x="3" y="4" width="2" height="2" fill="#111"/><rect x="7" y="4" width="2" height="2" fill="#111"/><rect x="4" y="7" width="4" height="1" fill="#ffd54a"/>',
    "Один урок дрифта": '<rect width="12" height="12" fill="#222"/><rect x="2" y="5" width="8" height="4" fill="#2a2a2a"/><rect x="1" y="6" width="10" height="2" fill="#444"/><path d="M3 8 L6 4 L9 8 Z" fill="#ff9800"/>',
    "Оклейка MacBook (dbrand)": '<rect width="12" height="12" fill="#333"/><rect x="2" y="2" width="8" height="6" rx="1" fill="#111"/><rect x="3" y="3" width="6" height="4" fill="#e040fb"/><rect x="4" y="8" width="4" height="1" fill="#666"/>',
    "Timekettle W4 Pro (перевод)": '<rect width="12" height="12" fill="#1a2030"/><rect x="2" y="5" width="8" height="5" fill="#2c3c55"/><rect x="3" y="4" width="2" height="2" fill="#4fc3f7"/><rect x="7" y="4" width="2" height="2" fill="#4fc3f7"/><rect x="5" y="7" width="2" height="1" fill="#90caf9"/>',
    "Стрельба: пулемёт / снайперка": '<rect width="12" height="12" fill="#2a2218"/><rect x="1" y="6" width="10" height="3" fill="#3e3428"/><rect x="0" y="5" width="4" height="2" fill="#555"/><rect x="8" y="5" width="4" height="2" fill="#555"/><rect x="5" y="3" width="2" height="5" fill="#1a1a1a"/>',
    "Под водой: субмарина / глайдер": '<rect width="12" height="12" fill="#0a1828"/><rect x="2" y="3" width="8" height="6" fill="#1565c0"/><rect x="4" y="5" width="4" height="2" fill="#4dd0e1"/><rect x="5" y="9" width="2" height="2" fill="#90a4ae"/>',
    "Whoop — последняя версия": '<rect width="12" height="12" fill="#111"/><rect x="4" y="2" width="4" height="8" rx="1" fill="#222"/><rect x="5" y="4" width="2" height="4" fill="#00e676"/>',
    "Стол из слика (шины)": '<rect width="12" height="12" fill="#222"/><ellipse cx="6" cy="7" rx="5" ry="3" fill="#1a1a1a"/><rect x="2" y="4" width="8" height="2" fill="#b0bec5" opacity="0.9"/><rect x="5" y="2" width="2" height="2" fill="#ff5722"/>',
    "День в Universal Studios": '<rect width="12" height="12" fill="#1a237e"/><rect x="2" y="2" width="8" height="6" fill="#3949ab"/><rect x="3" y="8" width="6" height="2" fill="#ffd600"/><rect x="5" y="4" width="2" height="2" fill="#fff"/>'
  };

  var PIX_DEFAULT = '<rect width="12" height="12" fill="#252b36"/><rect x="2" y="3" width="8" height="6" fill="#3a4558"/><rect x="4" y="5" width="4" height="2" fill="#7ecbff"/>';

  function svgForTitle(title) {
    var inner = PIX[title] || PIX_DEFAULT;
    var svg = document.createElementNS(NS, "svg");
    svg.setAttribute("viewBox", "0 0 12 12");
    svg.innerHTML = inner;
    return svg;
  }

  function el(name, cls, html) {
    var n = document.createElement(name);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }

  function renderNote(entry) {
    var p = el("p", "gift-note");
    if (entry.notePrefix && entry.note) {
      var strong = document.createElement("strong");
      strong.textContent = entry.notePrefix + ":";
      p.appendChild(strong);
      p.appendChild(document.createTextNode(" " + entry.note));
    } else if (entry.note) {
      p.textContent = entry.note;
    }
    return p;
  }

  function renderLinks(entry) {
    if (entry.links && entry.links.length) {
      var wrap = el("div", "gift-dual");
      for (var i = 0; i < entry.links.length; i++) {
        var L = entry.links[i];
        var a = el("a");
        a.href = L.href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = L.label;
        wrap.appendChild(a);
      }
      return wrap;
    }
    return null;
  }

  function buildCard(entry) {
    var title = entry.title || "";
    var href = entry.href;
    var isLink = !!href;
    var root = isLink ? el("a", "gift") : el("div", "gift");
    if (isLink) {
      root.href = href;
      root.target = "_blank";
      root.rel = "noopener noreferrer";
    } else {
      root.style.cursor = "default";
    }
    if (entry.dashed) root.style.borderStyle = "dashed";

    var pixWrap = el("span", "gift-pix");
    pixWrap.setAttribute("aria-hidden", "true");
    pixWrap.appendChild(svgForTitle(title));

    var body = el("span", "gift-body");
    var t = el("p", "gift-title");
    t.textContent = title;
    body.appendChild(t);

    var noteEl = renderNote(entry);
    if (noteEl && (noteEl.textContent || noteEl.childNodes.length)) body.appendChild(noteEl);

    var linksEl = renderLinks(entry);
    if (linksEl) body.appendChild(linksEl);

    root.appendChild(pixWrap);
    root.appendChild(body);
    return root;
  }

  function refresh() {
    var grid = document.getElementById("wishGrid");
    if (!grid) return;
    grid.innerHTML = "";
    var list = loadGarageWishlist();
    for (var i = 0; i < list.length; i++) {
      grid.appendChild(buildCard(list[i]));
    }
  }

  refresh();
  window.addEventListener("storage", function (ev) {
    if (ev.key === GARAGE_WISHLIST_STORAGE_KEY) refresh();
  });
  window.addEventListener("focus", refresh);
})();
</script>

</body>
</html>
