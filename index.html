<title>Блондинка Wish Casino ✨</title>
<style>
  /* Base: modern fluid type + safe areas */
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100dvh;
    min-height: 100vh;
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #3a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    background:
      radial-gradient(120% 80% at 10% 0%, rgba(255, 182, 225, 0.55), transparent 50%),
      radial-gradient(100% 70% at 90% 20%, rgba(186, 148, 255, 0.4), transparent 45%),
      radial-gradient(80% 60% at 50% 100%, rgba(255, 214, 165, 0.45), transparent 55%),
      linear-gradient(165deg, #fff5fb 0%, #ffe8f4 35%, #f3e8ff 100%);
    overflow-x: hidden;
  }

  .page {
    width: min(420px, 100%);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: clamp(14px, 4vw, 22px);
  }

  header {
    text-align: center;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.35rem, 5vw, 1.85rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(105deg, #ff2d8b 0%, #c44dff 45%, #ff6b9d 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 24px rgba(255, 80, 160, 0.25);
  }

  .sub {
    margin: 6px 0 0;
    font-size: clamp(0.8rem, 3.2vw, 0.95rem);
    opacity: 0.72;
    font-weight: 500;
  }

  .glass {
    position: relative;
    border-radius: clamp(20px, 5vw, 28px);
    padding: clamp(16px, 4.5vw, 24px);
    background: linear-gradient(145deg, rgba(255,255,255,0.55), rgba(255,255,255,0.22));
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow:
      0 4px 24px rgba(200, 100, 180, 0.12),
      0 24px 48px rgba(160, 80, 200, 0.08),
      inset 0 1px 0 rgba(255,255,255,0.9);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
  }

  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(130deg, rgba(255,255,255,0.9), rgba(255,180,220,0.35), rgba(200,150,255,0.4));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .slot {
    display: flex;
    gap: clamp(8px, 2.5vw, 14px);
    justify-content: center;
    margin-bottom: clamp(12px, 3vw, 18px);
  }

  /* Reel window: single visible row with shine */
  .reel-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
    max-width: 120px;
    height: var(--cell-h, 76px);
    border-radius: clamp(12px, 3vw, 18px);
    background: linear-gradient(180deg, #fff 0%, #faf5ff 100%);
    box-shadow:
      inset 0 2px 8px rgba(180, 100, 200, 0.08),
      0 8px 20px rgba(200, 100, 180, 0.12);
    overflow: hidden;
    isolation: isolate;
  }

  .reel-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.95) 0%,
      transparent 22%,
      transparent 78%,
      rgba(255,255,255,0.88) 100%
    );
    z-index: 2;
  }

  .reel-wrap.spinning::after {
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.75) 0%,
      transparent 18%,
      transparent 82%,
      rgba(255,255,255,0.7) 100%
    );
  }

  .reel-strip {
    will-change: transform;
    /* Duration/timing set inline in JS so transitions are not killed by transition: none */
  }

  .cell {
    height: var(--cell-h, 76px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 8px;
    font-size: clamp(9px, 2.6vw, 11px);
    font-weight: 600;
    line-height: 1.2;
    text-align: center;
    color: #4a1a40;
    border-bottom: 1px solid rgba(240, 200, 230, 0.5);
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: stretch;
  }

  .spin-btn {
    position: relative;
    border: none;
    border-radius: 999px;
    padding: clamp(14px, 4vw, 18px) 24px;
    font-size: clamp(0.95rem, 3.8vw, 1.05rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #fff;
    cursor: pointer;
    overflow: hidden;
    background: linear-gradient(120deg, #ff3d8f 0%, #e040fb 50%, #ff6b9d 100%);
    box-shadow:
      0 8px 28px rgba(255, 60, 140, 0.45),
      inset 0 1px 0 rgba(255,255,255,0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }

  .spin-btn::before {
    content: "";
    position: absolute;
    inset: -40%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .spin-btn:hover:not(:disabled)::before {
    transform: translateX(100%);
  }

  .spin-btn:active:not(:disabled) {
    transform: scale(0.97);
  }

  .spin-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    filter: grayscale(0.2);
    box-shadow: none;
  }

  .result {
    /* Fixed slot so empty / miss / almost / win do not shift layout */
    min-height: calc(1.35em * 4 + 8px);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: clamp(0.88rem, 3.4vw, 1rem);
    line-height: 1.35;
    color: #d81b7a;
    transition: color 0.3s ease, transform 0.3s ease;
  }

  .result.win {
    color: #00c853;
    text-shadow: 0 0 20px rgba(0, 200, 83, 0.35);
    animation: result-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .result.almost {
    color: #ff6d00;
  }

  @keyframes result-pop {
    0% { transform: scale(0.85); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Jackpot glow on machine */
  .glass.jackpot {
    animation: glass-pulse 0.8s ease-in-out infinite alternate;
  }

  @keyframes glass-pulse {
    from { box-shadow: 0 4px 24px rgba(255, 60, 140, 0.25), 0 0 0 0 rgba(255, 100, 200, 0.35); }
    to { box-shadow: 0 8px 40px rgba(255, 180, 80, 0.35), 0 0 48px rgba(255, 120, 200, 0.45); }
  }

  .reel-wrap.win-ring {
    animation: reel-win 0.55s ease-in-out infinite alternate;
  }

  @keyframes reel-win {
    from { box-shadow: inset 0 2px 8px rgba(255, 200, 100, 0.2), 0 0 0 2px rgba(255, 215, 0, 0.5); }
    to { box-shadow: inset 0 2px 8px rgba(255, 200, 100, 0.35), 0 0 0 4px rgba(255, 100, 200, 0.65); }
  }

  /* Emoji confetti layer */
  #fx-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    font-size: clamp(18px, 5vw, 28px);
    left: var(--x);
    top: var(--y);
    opacity: 0;
    animation: particle-burst var(--dur) cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: var(--delay);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  @keyframes particle-burst {
    0% {
      opacity: 0;
      transform: translate(0, 0) scale(0.3) rotate(0deg);
    }
    12% { opacity: 1; }
    100% {
      opacity: 0;
      transform: translate(var(--tx), var(--ty)) scale(1.1) rotate(var(--rot));
    }
  }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.85), transparent 55%);
    opacity: 0;
    animation: flash-win 0.9s ease-out forwards;
  }

  @keyframes flash-win {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  @media (max-width: 380px) {
    :root { --cell-h: 70px; }
  }

  @media (min-width: 480px) {
    :root { --cell-h: 82px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reel-strip { transition-duration: 0.01ms !important; }
    .particle, .flash, .glass.jackpot, .reel-wrap.win-ring, .result.win {
      animation: none !important;
    }
  }

  .garage-nav {
    margin: 10px 0 0;
    text-align: center;
    font-size: clamp(0.72rem, 2.8vw, 0.82rem);
    font-weight: 500;
  }

  .garage-nav a {
    color: rgba(180, 80, 160, 0.85);
    text-decoration: none;
    border-bottom: 1px solid rgba(200, 100, 180, 0.35);
  }

  .garage-nav a:hover {
    border-bottom-color: rgba(216, 27, 122, 0.75);
    color: #d81b7a;
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <h1>Блондинка Wish Casino ✨</h1>

<script>
(function () {
  const items = [
    "Tom Ford Lost Cherry",
    "Gentle Monster очки",
    "Onitsuka Tiger розовые",
    "YSL сумка",
    "LV коллаба",
    "MM6 Glam Slam",
    "Paragliding",

    "Apple Watch 💕",
    "Шпиц 🐶",
    "Chanel flap bag",
    "Alo yoga костюм",
    "Vivienne Westwood",
    "F1 мерч",
    "Квест 💀"
  ];

  const EMOJI_BURST = ["🎉", "✨", "💖", "🌟", "💫", "🥳", "🎊", "💎", "👑", "🔥", "💘", "🌸", "⭐", "🦋", "💝"];

  // Rotating copy: next line each spin (cycles through all 30)
  const PHRASES_ALMOST = [
    "БЛИН... почти 😭 попробуй ещё",
    "Вааай, блондинке не хватило одной крутилки 💅",
    "Почти-почти — вселенная дразнится специально ✨",
    "Ну нееет, мы так близко были 🥲 ещё разок?",
    "Блондинка в шоке: один слот решил по-своему 💖",
    "Это уже не RNG, это роман с отказом 💔",
    "Почти джекпот, но слоты любят интригу 😉",
    "Блин, драма на миллион — ещё один спин?",
    "Три в ряд мечтает о тебе с следующего клика",
    "Настолько близко, что хочется щёлкнуть пальцами",
    "Блондинкий вайб: «чуть-чуть не судьба» 💫",
    "Вселенная: «держи напряжение» 😭 попробуй ещё",
    "Одна карточка решила быть уникальной queen 👑",
    "Почти идеал — значит, следующий точно зайдёт",
    "Слоты шепчут: ещё чуть-чуть терпения ✨",
    "Блондинка не плачет, блондинка КРУТИТ снова 💅",
    "Ну вот жеесть, сердце уже выбрало подарок 🎁",
    "Tease mode: почти, но не финал 😤",
    "Разница в один пиксель души — крути ещё",
    "Почти-мечта: осталось докрутить красоту",
    "Блондинка в душе уже празднует… чуть рано 😭",
    "Так близко к «вау», что обидно миленько",
    "Судьба на полточки — добей следующим спином",
    "Один слот с характером — видимо, блондинка тоже",
    "Почти триумф — добавь огня кнопкой КРУТИТЬ 🔥",
    "Вайб «чуть не сегодня» — завтра уже здесь",
    "Блондинка заслужила повтор: всё шло к победе",
    "Рандом будто флиртует: ещё один заход? 😉",
    "Сердце: да / Слоты: подождиии 😭 ещё раз",
    "Почти легенда — добей этот главный трек"
  ];

  const PHRASES_MISS = [
    "Пока не сложилось — крути снова, удача рядом ✨",
    "Блондинка делает паузу для драмы — и снова в бой 💅",
    "Слоты решили сначала помучить, потом удивить",
    "Не тот расклад — зато следующий может быть кино 🎬",
    "Вайб «ещё сезон» — крутани, там светит ярче",
    "Рандом листает страницы: выбираем следующую 💫",
    "Сегодня не твой пик — но клик близко к пику",
    "Блондинка не сдаётся, вселенная просто разогревается",
    "Пока пусто — значит, копим крупный «вау» потом",
    "Слоты скромничают — обидно? делаем энкор 🔄",
    "Не попало — не беда, у блондинки запас упрямства",
    "Вайб chill: проигрываем сцену, выигрываем спином",
    "Ни пары — зато история «я почти бил легенду»",
    "Слоты перетасовались — попробуй свежий набор удачи",
    "Блондинка в режиме «ещё один ради эстетики» ✨",
    "Не сложилось — зато драйв на месте, крути",
    "Пустой прогон = прогрев грандиозного лута дальше",
    "Рандом: «держи интригу» — жмём снова без паники",
    "Пока мимо — но красота спина остаётся с тобой 💖",
    "Слоты играют в холодно-горячо — греем дальше?",
    "Не в этот раз — зато блондинский риск оправдан",
    "Вроде тихо — а значит, буришь следующую волну 🌊",
    "Пусто? Скорее «не сейчас» — крутани по-новой",
    "Блондинка: «ок, плот twist» — следующий заход твой",
    "Без совпадений, но с полным вайбом и ноль страха",
    "Судьба переносит кайф на следующий спин — go",
    "Не этот раунд — зато драматургия на высоте 🎭",
    "Слоты крутятся, блондинка мысленно уже в шампанском",
    "Мимо — ровно настолько, чтобы захотеть реванш",
    "Пока не сошлось — жми снова, там теплее и ближе"
  ];

  let phraseIxAlmost = 0;
  let phraseIxMiss = 0;

  function nextPhraseAlmost() {
    const t = PHRASES_ALMOST[phraseIxAlmost];
    phraseIxAlmost = (phraseIxAlmost + 1) % PHRASES_ALMOST.length;
    return t;
  }

  function nextPhraseMiss() {
    const t = PHRASES_MISS[phraseIxMiss];
    phraseIxMiss = (phraseIxMiss + 1) % PHRASES_MISS.length;
    return t;
  }

  const strips = [0, 1, 2].map((i) => document.getElementById("strip" + i));
  const wraps = () => document.querySelectorAll(".reel-wrap");
  const resultEl = document.getElementById("result");
  const spinBtn = document.getElementById("spinBtn");
  const machine = document.getElementById("machine");
  const fxLayer = document.getElementById("fx-layer");

  const DEBUG = new URLSearchParams(location.search).has("debug");
  function dbg() {
    if (DEBUG) console.log.apply(console, ["[slots]"].concat([].slice.call(arguments)));
  }

  function cellHeight() {
    const wrap = document.querySelector(".reel-wrap");
    return wrap ? wrap.getBoundingClientRect().height : 76;
  }

  function randomItem() {
    return items[Math.floor(Math.random() * items.length)];
  }

  function buildStrip(stripEl, finalText, cycles, rng) {
    const list = [];
    const c = Math.max(12, cycles);
    for (let i = 0; i < c; i++) list.push(items[Math.floor(rng() * items.length)]);
    list.push(finalText);
    stripEl.innerHTML = "";
    list.forEach((t) => {
      const d = document.createElement("div");
      d.className = "cell";
      d.textContent = t;
      stripEl.appendChild(d);
    });
    return list.length;
  }

  let spinning = false;

  function pickOutcome(rng) {
    const r = rng();
    if (r < 0.11) return "jackpot";
    if (r < 0.34) return "almost";
    return "miss";
  }

  function spawnConfetti() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const count = Math.min(80, Math.floor(w / 5));
    const frag = document.createDocumentFragment();
    for (let i = 0; i < count; i++) {
      const el = document.createElement("span");
      el.className = "particle";
      el.textContent = EMOJI_BURST[Math.floor(Math.random() * EMOJI_BURST.length)];
      const cx = 0.35 + Math.random() * 0.3;
      const cy = 0.32 + Math.random() * 0.22;
      el.style.setProperty("--x", (cx * w) + "px");
      el.style.setProperty("--y", (cy * h) + "px");
      const angle = Math.random() * Math.PI * 2;
      const dist = 120 + Math.random() * 280;
      el.style.setProperty("--tx", Math.cos(angle) * dist + "px");
      el.style.setProperty("--ty", Math.sin(angle) * dist - 40 + "px");
      el.style.setProperty("--rot", (Math.random() * 720 - 360) + "deg");
      el.style.setProperty("--dur", (1.8 + Math.random() * 1.2) + "s");
      el.style.setProperty("--delay", (Math.random() * 0.25) + "s");
      frag.appendChild(el);
    }
    fxLayer.appendChild(frag);
    setTimeout(() => {
      fxLayer.innerHTML = "";
    }, 3500);
  }

  function winFlash() {
    const f = document.createElement("div");
    f.className = "flash";
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }

  function vibrateShort() {
    if (navigator.vibrate) navigator.vibrate([18, 40, 22, 50, 28]);
  }

  function spin() {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    resultEl.textContent = "";
    resultEl.classList.remove("win", "almost");
    machine.classList.remove("jackpot");
    wraps().forEach((w) => w.classList.remove("win-ring", "spinning"));

    const rng = Math.random;
    const outcome = pickOutcome(rng);
    let final0, final1, final2;
    if (outcome === "jackpot") {
      final0 = final1 = final2 = randomItem();
    } else if (outcome === "almost") {
      const same = randomItem();
      let other = randomItem();
      let guard = 0;
      while (other === same && guard++ < 50) other = randomItem();
      // Three "near miss" layouts: first+second | first+third (extremes) | second+third
      const layout = Math.floor(rng() * 3);
      if (layout === 0) {
        final0 = same;
        final1 = same;
        final2 = other;
      } else if (layout === 1) {
        final0 = same;
        final1 = other;
        final2 = same;
      } else {
        final0 = other;
        final1 = same;
        final2 = same;
      }
    } else {
      final0 = randomItem();
      final1 = randomItem();
      final2 = randomItem();
      let guard = 0;
      while ((final0 === final1 && final1 === final2) && guard++ < 80) {
        final2 = randomItem();
      }
    }

    const baseCycles = 18 + Math.floor(rng() * 8);
    const durations = [2200 + rng() * 400, 2800 + rng() * 450, 3400 + rng() * 500];
    const ease = "cubic-bezier(0.22, 1, 0.36, 1)";

    strips.forEach((strip, i) => {
      const fin = i === 0 ? final0 : i === 1 ? final1 : final2;
      const len = buildStrip(strip, fin, baseCycles + i * 4, rng);
      strip.parentElement.classList.add("spinning");
      const h = cellHeight();
      const targetY = (len - 1) * h;
      const ms = Math.round(durations[i]);

      strip.style.removeProperty("transition");
      strip.style.transform = "translateY(0)";
      void strip.offsetHeight;

      dbg("spin start reel", i, { len, h, targetY, ms, inlineBefore: strip.getAttribute("style") });

      const run = function () {
        strip.style.transition = "transform " + ms + "ms " + ease;
        strip.style.transform = "translateY(-" + targetY + "px)";
        if (DEBUG) {
          requestAnimationFrame(function () {
            dbg("reel", i, "computed", getComputedStyle(strip).transition, getComputedStyle(strip).transform);
          });
        }
      };
      requestAnimationFrame(function () {
        requestAnimationFrame(run);
      });
    });

    const maxDur = Math.max(...durations);
    window.setTimeout(() => {
      strips.forEach((s) => s.parentElement.classList.remove("spinning"));
      spinning = false;
      spinBtn.disabled = false;

      const win = final0 === final1 && final1 === final2;
      const almost = !win && ((final0 === final1) || (final1 === final2) || (final0 === final2));

      if (win) {
        resultEl.textContent = "ДЖЕКПОТ! Блондинка сегодня в ударе — забирай! 💖";
        resultEl.classList.add("win");
        machine.classList.add("jackpot");
        wraps().forEach((w) => w.classList.add("win-ring"));
        winFlash();
        spawnConfetti();
        vibrateShort();
      } else if (almost) {
        resultEl.textContent = nextPhraseAlmost();
        resultEl.classList.add("almost");
      } else {
        resultEl.textContent = nextPhraseMiss();
      }
    }, maxDur + 80);
  }

  spinBtn.addEventListener("click", spin);

  // Initial idle display: land on last row without motion blur
  strips.forEach((strip, i) => {
    const init = [randomItem(), randomItem(), randomItem()];
    buildStrip(strip, init[i], 10, Math.random);
    const h = cellHeight();
    const n = strip.children.length;
    strip.style.removeProperty("transition");
    strip.style.transform = "translateY(-" + (n - 1) * h + "px)";
  });
})();
</script>
</body>
</html>
